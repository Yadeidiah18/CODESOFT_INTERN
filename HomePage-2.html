<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Board Demo</title>
    <link rel="stylesheet" href="styles/Homepage2.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo-group">
                <div class="logo-icon">Q</div>
                <div class="logo-text">
                    <strong>Job Board</strong>
                    <span>Find your dream job</span>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Browse Job</a></li>
                <li><a href="#">Pages ▾</a></li>
                <li><a href="#">Blog ▾</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div class="nav-auth">
                <a href="#" class="login-link">Log in</a>
                <button class="btn-green">Post A Job</button>
            </div>
        </nav>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <p class="job-count">4536+ Jobs listed</p>
            <h1>Find your Dream Job</h1>
            <p class="hero-subtext">We provide the best career opportunities with quick approval that suit your skills.</p>
            <button class="btn-green upload-btn">Upload Your Resume</button>
        </div>
       <div class="hero-image">
    <img src="businesspeople-office.zip">
</div>
        
        <div class="search-bar">
            <input type="text" placeholder="Search keyword">
            <select>
                <option>Location</option>
            </select>
            <select>
                <option>Category</option>
            </select>
            <button class="btn-green find-btn">Find Job</button>
        </div>
    </section>

</html>
