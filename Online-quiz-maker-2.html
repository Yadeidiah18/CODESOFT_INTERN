<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online-quiz-maker-2</title>
  <link href="styles/Online-quiz-maker-2.css" rel="stylesheet">
</head>
<body>
  <div class="survey-container">
  <div class="icon plant">🌿</div>
  <div class="icon bike">🚲</div>
  <div class="icon orange">🍊</div>
  <div class="icon banana">🍌</div>
  <div class="icon shoe">👟</div>

  <div class="progress-bar"></div>

  <div class="content">
    <p class="question-number">Question 6/13</p>
    <h2 class="question-text">
      HAVE YOU PRACTICED SPORT OR ANY PHYSICAL ACTIVITY OUT OF YOUR WORKING HOURS AT LEAST 30 MIN OR MORE DURING THE LAST MONTH?
    </h2>

    <div class="options">
      <button class="option-btn">
        <span class="label">A</span> 3 times or more per week
      </button>
      <button class="option-btn active">
        <span class="label">B</span> 1 or 2 times per week
      </button>
      <button class="option-btn">
        <span class="label">C</span> Less than 4 times per month
      </button>
      <button class="option-btn">
        <span class="label">D</span> I don't practise sport during the month
      </button>
    </div>
  </div>
</div>
</body>
</html>
